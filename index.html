<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VPS 剩余价值计算器</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #050505;
            --neon-cyan: #0ff;
            --neon-pink: #f0f;
            --neon-yellow: #ff0;
            --grid-color: rgba(0, 255, 255, 0.1);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Orbitron', 'Microsoft YaHei', sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--neon-cyan);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background-image: 
                linear-gradient(var(--grid-color) 1px, transparent 1px),
                linear-gradient(90deg, var(--grid-color) 1px, transparent 1px);
            background-size: 30px 30px;
            padding: 20px;
        }

        .container {
            background: rgba(5, 5, 5, 0.85);
            border: 1px solid var(--neon-cyan);
            box-shadow: 0 0 15px rgba(0, 255, 255, 0.3),
                        inset 0 0 15px rgba(0, 255, 255, 0.1);
            padding: 30px;
            width: 100%;
            max-width: 500px;
            backdrop-filter: blur(5px);
            position: relative;
        }

        /* 标题故障动效 */
        h1 {
            text-align: center;
            font-size: 24px;
            margin-bottom: 30px;
            letter-spacing: 2px;
            position: relative;
            animation: glitch 3s infinite;
        }

        @keyframes glitch {
            0% { text-shadow: 2px 0 var(--neon-pink), -2px 0 var(--neon-cyan); transform: translate(0); }
            2% { text-shadow: -2px 0 var(--neon-pink), 2px 0 var(--neon-cyan); transform: translate(-2px, 1px); }
            4% { text-shadow: 2px 0 var(--neon-pink), -2px 0 var(--neon-cyan); transform: translate(2px, -1px); }
            6% { text-shadow: 0 0 10px var(--neon-cyan); transform: translate(0); }
            100% { text-shadow: 0 0 10px var(--neon-cyan); transform: translate(0); }
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            font-size: 13px;
            color: #aaa;
            letter-spacing: 1px;
        }

        .input-group {
            display: flex;
            gap: 10px;
        }

        /* ------------------ 输入框基础与悬浮动效 ------------------ */
        input, select {
            width: 100%;
            background: rgba(0, 0, 0, 0.6);
            border: 1px solid #333;
            color: #fff;
            padding: 12px;
            font-size: 16px;
            outline: none;
            transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
        }

        /* 鼠标悬浮时微亮 */
        input:hover, select:hover {
            border-color: rgba(0, 255, 255, 0.4);
            box-shadow: 0 0 8px rgba(0, 255, 255, 0.2);
        }

        select {
            cursor: pointer;
            appearance: none;
        }

        select option {
            background: var(--bg-color);
            color: #fff;
        }

        ::-webkit-calendar-picker-indicator {
            filter: invert(1) drop-shadow(0 0 2px var(--neon-cyan));
            cursor: pointer;
        }

        /* ------------------ 输入框聚焦与敲击动效 ------------------ */
        @keyframes cyber-focus {
            0% { transform: scale(1); box-shadow: 0 0 0 rgba(0, 255, 255, 0); }
            40% { transform: scale(1.02); box-shadow: 0 0 15px var(--neon-cyan); border-color: var(--neon-cyan); }
            100% { transform: scale(1.01); box-shadow: 0 0 10px rgba(0, 255, 255, 0.5); border-color: var(--neon-cyan); }
        }

        input:focus, select:focus {
            animation: cyber-focus 0.3s forwards;
            outline: none;
        }

        /* 敲击/选择时的故障震动 */
        @keyframes type-glitch {
            0% { transform: scale(1.01) translateX(0); border-color: var(--neon-cyan); }
            25% { transform: scale(1.01) translateX(-3px); border-color: var(--neon-pink); text-shadow: 2px 0 var(--neon-pink); box-shadow: 0 0 15px var(--neon-pink); }
            75% { transform: scale(1.01) translateX(3px); border-color: var(--neon-yellow); text-shadow: -2px 0 var(--neon-yellow); box-shadow: 0 0 15px var(--neon-yellow); }
            100% { transform: scale(1.01) translateX(0); border-color: var(--neon-cyan); text-shadow: none; box-shadow: 0 0 10px rgba(0, 255, 255, 0.5); }
        }

        .typing-anim {
            animation: type-glitch 0.2s ease-in-out !important;
        }

        /* 按钮呼吸动效 */
        button {
            width: 100%;
            background: rgba(0, 255, 255, 0.05);
            border: 2px solid var(--neon-cyan);
            color: var(--neon-cyan);
            padding: 15px;
            font-size: 16px;
            font-weight: bold;
            letter-spacing: 2px;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-top: 10px;
            animation: neon-pulse 2s infinite alternate;
        }

        @keyframes neon-pulse {
            0% { box-shadow: 0 0 5px rgba(0, 255, 255, 0.2), inset 0 0 5px rgba(0, 255, 255, 0.1); }
            100% { box-shadow: 0 0 15px rgba(0, 255, 255, 0.6), inset 0 0 10px rgba(0, 255, 255, 0.3); }
        }

        button:hover {
            background: var(--neon-cyan);
            color: var(--bg-color);
            box-shadow: 0 0 25px rgba(0, 255, 255, 1);
            animation: none;
        }

        /* 汇率看板样式 */
        .rate-board {
            margin-top: 25px;
            border: 1px solid rgba(255, 0, 255, 0.3);
            background: rgba(255, 0, 255, 0.05);
            padding: 15px;
            position: relative;
        }

        .rate-board::before {
            content: "LIVE EXCHANGE RATES";
            position: absolute;
            top: -10px;
            left: 15px;
            background: var(--bg-color);
            padding: 0 5px;
            font-size: 10px;
            color: var(--neon-pink);
            letter-spacing: 1px;
        }

        .rate-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 8px 15px;
            font-size: 12px;
        }

        .rate-item {
            display: flex;
            justify-content: space-between;
            border-bottom: 1px dashed rgba(255, 255, 255, 0.1);
            padding-bottom: 3px;
        }

        .rate-item span:first-child {
            color: #888;
        }

        .rate-item span:last-child {
            color: var(--neon-yellow);
            text-shadow: 0 0 3px rgba(255, 255, 0, 0.5);
        }

        .result-box {
            margin-top: 25px;
            border-top: 1px dashed #333;
            padding-top: 20px;
            display: none;
            animation: fade-in 0.5s ease-out;
        }

        @keyframes fade-in {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .result-item {
            display: flex;
            justify-content: space-between;
            margin-bottom: 10px;
            font-size: 14px;
        }

        .result-value {
            color: #fff;
            font-weight: bold;
        }

        .value-display {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 15px;
            padding: 10px;
            background: rgba(0, 255, 255, 0.05);
            border: 1px solid rgba(0, 255, 255, 0.2);
        }

        .value-display span:first-child {
            color: #aaa;
            font-size: 14px;
        }

        .value-display span:last-child {
            font-size: 20px;
            color: var(--neon-cyan);
            font-weight: bold;
            text-shadow: 0 0 5px var(--neon-cyan);
        }

        .cny-display span:last-child {
            color: var(--neon-pink);
            text-shadow: 0 0 5px var(--neon-pink);
        }

        #apiStatus {
            text-align: center;
            font-size: 12px;
            color: #888;
            margin-top: 15px;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>VPS 剩余价值计算器</h1>

        <div class="form-group">
            <label>付款周期</label>
            <select id="cycle">
                <option value="1">月付 (1个月)</option>
                <option value="3">季付 (3个月)</option>
                <option value="6">半年付 (6个月)</option>
                <option value="12">年付 (1年)</option>
                <option value="24">两年付 (2年)</option>
                <option value="36">三年付 (3年)</option>
            </select>
        </div>

        <div class="form-group">
            <label>购买/续费价格</label>
            <div class="input-group">
                <input type="number" id="price" placeholder="请输入金额" min="0" step="0.01">
                <select id="currency">
                    <option value="CNY">CNY (人民币)</option>
                    <option value="USD">USD (美元)</option>
                    <option value="EUR">EUR (欧元)</option>
                    <option value="GBP">GBP (英镑)</option>
                    <option value="JPY">JPY (日元)</option>
                    <option value="HKD">HKD (港币)</option>
                    <option value="TWD">TWD (新台币)</option>
                    <option value="SGD">SGD (新加坡元)</option>
                    <option value="CAD">CAD (加拿大元)</option>
                    <option value="AUD">AUD (澳大利亚元)</option>
                    <option value="KRW">KRW (韩元)</option>
                    <option value="RUB">RUB (俄罗斯卢布)</option>
                </select>
            </div>
        </div>

        <div class="form-group">
            <label>下次到期日期</label>
            <input type="date" id="endDate" max="9999-12-31">
        </div>

        <div class="form-group">
            <label>交易/计算日期 (默认东八区今日)</label>
            <input type="date" id="todayDate" max="9999-12-31">
        </div>

        <button onclick="calculate()">执行数据流演算</button>

        <div id="apiStatus">正在建立数据链路...</div>

        <div class="rate-board">
            <div class="rate-grid" id="rateGrid">
                <div style="grid-column: span 2; text-align: center; color: #888; font-size: 12px;">等待节点响应...</div>
            </div>
        </div>

        <div id="resultBox" class="result-box">
            <div class="result-item">
                <span>总时长:</span>
                <span class="result-value"><span id="totalDays">0</span> 天</span>
            </div>
            <div class="result-item">
                <span>剩余时长:</span>
                <span class="result-value"><span id="remainDays">0</span> 天</span>
            </div>
            
            <div class="value-display">
                <span>原币剩余价值:</span>
                <span id="originalValue">USD 0.00</span>
            </div>

            <div class="value-display cny-display">
                <span>折合人民币:</span>
                <span id="cnyValue">CNY 0.00</span>
            </div>
        </div>
    </div>

    <script>
        // ------------------ 动效触发脚本 ------------------
        document.querySelectorAll('input, select').forEach(el => {
            el.addEventListener('input', function() {
                this.classList.remove('typing-anim');
                void this.offsetWidth; 
                this.classList.add('typing-anim');
            });
        });

        // ------------------ 东八区时间实时同步模块 ------------------
        const todayInput = document.getElementById('todayDate');
        let isTodayModified = false;

        // 记录用户是否手动修改了交易日期
        todayInput.addEventListener('change', () => {
            isTodayModified = true;
        });

        function syncEast8Date() {
            // 如果用户手动改了日期，就不自动覆盖
            if (isTodayModified) return;

            // 获取东八区 (Asia/Shanghai) 的当前时间字符串
            const d = new Date(new Date().toLocaleString("en-US", {timeZone: "Asia/Shanghai"}));
            const yyyy = d.getFullYear();
            const mm = String(d.getMonth() + 1).padStart(2, '0');
            const dd = String(d.getDate()).padStart(2, '0');
            const dateStr = `${yyyy}-${mm}-${dd}`;

            // 只有当时间跨天发生变化时才修改 DOM
            if (todayInput.value !== dateStr) {
                todayInput.value = dateStr;
            }
        }

        // 初始化时执行一次
        syncEast8Date();
        // 当用户从其他应用或标签页切回该页面时，检查并刷新日期
        window.addEventListener('focus', syncEast8Date);
        // 定时器：每 5 分钟检查一次，应对网页一直保持前台显示的情况
        setInterval(syncEast8Date, 300000);


        // ------------------ 汇率与计算模块 ------------------
        let exchangeRates = {};
        const targetCurrencies = ['usd', 'eur', 'gbp', 'jpy', 'hkd', 'twd', 'sgd', 'cad', 'aud', 'krw'];

        async function fetchRates() {
            const statusEl = document.getElementById('apiStatus');
            try {
                const response = await fetch('https://cdn.jsdelivr.net/npm/@fawazahmed0/currency-api@latest/v1/currencies/cny.json');
                const data = await response.json();
                exchangeRates = data.cny;
                statusEl.innerText = "系统网络：数据已同步";
                statusEl.style.color = "var(--neon-cyan)";
                renderRateBoard(); 
            } catch (error) {
                console.error("汇率获取失败:", error);
                statusEl.innerText = "系统网络：同步失败，切入离线模式";
                statusEl.style.color = "var(--neon-pink)";
                document.getElementById('rateGrid').innerHTML = '<div style="grid-column: span 2; text-align: center; color: var(--neon-pink);">离线模式无法获取汇率</div>';
            }
        }

        window.onload = fetchRates;

        function renderRateBoard() {
            const grid = document.getElementById('rateGrid');
            grid.innerHTML = ''; 
            
            targetCurrencies.forEach(cur => {
                if (exchangeRates[cur]) {
                    const rateToCNY = 1 / exchangeRates[cur];
                    const item = document.createElement('div');
                    item.className = 'rate-item';
                    item.innerHTML = `<span>1 ${cur.toUpperCase()}</span><span>≈ ${rateToCNY.toFixed(4)} CNY</span>`;
                    grid.appendChild(item);
                }
            });
        }

        function calculate() {
            const price = parseFloat(document.getElementById('price').value);
            const currency = document.getElementById('currency').value;
            const cycleMonths = parseInt(document.getElementById('cycle').value);
            const end = new Date(document.getElementById('endDate').value);
            const today = new Date(document.getElementById('todayDate').value);

            if (!price || isNaN(end)) {
                alert("终端警告：输入参数缺失");
                return;
            }

            const start = new Date(end);
            start.setMonth(start.getMonth() - cycleMonths);

            let expectedMonth = (end.getMonth() - cycleMonths) % 12;
            if (expectedMonth < 0) expectedMonth += 12;
            if (start.getMonth() !== expectedMonth) {
                start.setDate(0); 
            }

            const totalMs = end - start;
            const remainMs = end - today;

            if (totalMs <= 0 || remainMs <= 0) {
                alert("终端警告：时间戳溢出或已失效");
                return;
            }

            const totalDays = Math.ceil(totalMs / (1000 * 60 * 60 * 24));
            const remainDays = Math.ceil(remainMs / (1000 * 60 * 60 * 24));
            
            const leftValue = (price / totalDays) * remainDays;

            let leftValueCNY = leftValue;
            const currencyLower = currency.toLowerCase();
            
            if (currencyLower !== 'cny' && exchangeRates[currencyLower]) {
                leftValueCNY = leftValue / exchangeRates[currencyLower];
            }

            document.getElementById('totalDays').innerText = totalDays;
            document.getElementById('remainDays').innerText = remainDays;
            
            document.getElementById('originalValue').innerText = `${currency} ${leftValue.toFixed(2)}`;
            document.getElementById('cnyValue').innerText = `CNY ${leftValueCNY.toFixed(2)}`;
            
            const resultBox = document.getElementById('resultBox');
            resultBox.style.display = 'block';
            resultBox.style.animation = 'none';
            resultBox.offsetHeight; 
            resultBox.style.animation = 'fade-in 0.5s ease-out';
        }
    </script>
</body>
</html>
