<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VPS 剩余价值计算器</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #050505;
            --neon-cyan: #0ff;
            --neon-pink: #f0f;
            --grid-color: rgba(0, 255, 255, 0.1);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Orbitron', 'Microsoft YaHei', sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--neon-cyan);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background-image: 
                linear-gradient(var(--grid-color) 1px, transparent 1px),
                linear-gradient(90deg, var(--grid-color) 1px, transparent 1px);
            background-size: 30px 30px;
            padding: 20px;
        }

        .container {
            background: rgba(5, 5, 5, 0.85);
            border: 1px solid var(--neon-cyan);
            box-shadow: 0 0 15px rgba(0, 255, 255, 0.3),
                        inset 0 0 15px rgba(0, 255, 255, 0.1);
            padding: 30px;
            width: 100%;
            max-width: 500px;
            backdrop-filter: blur(5px);
        }

        h1 {
            text-align: center;
            font-size: 24px;
            margin-bottom: 30px;
            text-shadow: 0 0 10px var(--neon-cyan);
            letter-spacing: 2px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            font-size: 13px;
            color: #aaa;
            letter-spacing: 1px;
        }

        .input-group {
            display: flex;
            gap: 10px;
        }

        input, select {
            width: 100%;
            background: transparent;
            border: 1px solid #333;
            color: #fff;
            padding: 12px;
            font-size: 16px;
            outline: none;
            transition: all 0.3s ease;
        }

        input:focus, select:focus {
            border-color: var(--neon-cyan);
            box-shadow: 0 0 10px rgba(0, 255, 255, 0.5);
        }

        select {
            cursor: pointer;
            appearance: none;
            background: rgba(0, 255, 255, 0.05);
        }

        select option {
            background: var(--bg-color);
            color: #fff;
        }

        ::-webkit-calendar-picker-indicator {
            filter: invert(1) drop-shadow(0 0 2px var(--neon-cyan));
            cursor: pointer;
        }

        button {
            width: 100%;
            background: transparent;
            border: 2px solid var(--neon-cyan);
            color: var(--neon-cyan);
            padding: 15px;
            font-size: 16px;
            font-weight: bold;
            letter-spacing: 2px;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-top: 10px;
            text-shadow: 0 0 5px var(--neon-cyan);
            box-shadow: 0 0 10px rgba(0, 255, 255, 0.2),
                        inset 0 0 10px rgba(0, 255, 255, 0.1);
        }

        button:hover {
            background: var(--neon-cyan);
            color: var(--bg-color);
            box-shadow: 0 0 20px rgba(0, 255, 255, 0.8);
            text-shadow: none;
        }

        .result-box {
            margin-top: 30px;
            border-top: 1px dashed #333;
            padding-top: 20px;
            display: none;
        }

        .result-item {
            display: flex;
            justify-content: space-between;
            margin-bottom: 10px;
            font-size: 14px;
        }

        .result-value {
            color: #fff;
            font-weight: bold;
        }

        .value-display {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 15px;
            padding: 10px;
            background: rgba(0, 255, 255, 0.05);
            border: 1px solid rgba(0, 255, 255, 0.2);
        }

        .value-display span:first-child {
            color: #aaa;
            font-size: 14px;
        }

        .value-display span:last-child {
            font-size: 20px;
            color: var(--neon-cyan);
            font-weight: bold;
            text-shadow: 0 0 5px var(--neon-cyan);
        }

        .cny-display span:last-child {
            color: var(--neon-pink);
            text-shadow: 0 0 5px var(--neon-pink);
        }

        #apiStatus {
            text-align: center;
            font-size: 12px;
            color: #888;
            margin-top: 15px;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>VPS 剩余价值计算器</h1>

        <div class="form-group">
            <label>购买/续费价格</label>
            <div class="input-group">
                <input type="number" id="price" placeholder="请输入金额" min="0" step="0.01">
                <select id="currency">
                    <option value="CNY">CNY (人民币)</option>
                    <option value="USD">USD (美元)</option>
                    <option value="EUR">EUR (欧元)</option>
                    <option value="GBP">GBP (英镑)</option>
                    <option value="JPY">JPY (日元)</option>
                    <option value="HKD">HKD (港币)</option>
                    <option value="TWD">TWD (新台币)</option>
                    <option value="SGD">SGD (新加坡元)</option>
                    <option value="CAD">CAD (加拿大元)</option>
                    <option value="AUD">AUD (澳大利亚元)</option>
                    <option value="KRW">KRW (韩元)</option>
                    <option value="RUB">RUB (俄罗斯卢布)</option>
                </select>
            </div>
        </div>

        <div class="form-group">
            <label>上次续费/购买日期</label>
            <input type="date" id="startDate">
        </div>

        <div class="form-group">
            <label>下次到期日期</label>
            <input type="date" id="endDate">
        </div>

        <div class="form-group">
            <label>交易/计算日期 (默认今天)</label>
            <input type="date" id="todayDate">
        </div>

        <button onclick="calculate()">立即计算</button>

        <div id="apiStatus">正在获取实时汇率...</div>

        <div id="resultBox" class="result-box">
            <div class="result-item">
                <span>总时长:</span>
                <span class="result-value"><span id="totalDays">0</span> 天</span>
            </div>
            <div class="result-item">
                <span>剩余时长:</span>
                <span class="result-value"><span id="remainDays">0</span> 天</span>
            </div>
            
            <div class="value-display">
                <span>原币剩余价值:</span>
                <span id="originalValue">USD 0.00</span>
            </div>

            <div class="value-display cny-display">
                <span>折合人民币:</span>
                <span id="cnyValue">CNY 0.00</span>
            </div>
        </div>
    </div>

    <script>
        // 初始化今天日期
        document.getElementById('todayDate').valueAsDate = new Date();

        // 汇率存储对象（以 CNY 为基准）
        let exchangeRates = {};

        // 异步获取最新汇率
        async function fetchRates() {
            const statusEl = document.getElementById('apiStatus');
            try {
                // 使用无需鉴权的开源汇率 API
                const response = await fetch('https://cdn.jsdelivr.net/npm/@fawazahmed0/currency-api@latest/v1/currencies/cny.json');
                const data = await response.json();
                exchangeRates = data.cny;
                statusEl.innerText = "汇率同步成功";
                statusEl.style.color = "var(--neon-cyan)";
            } catch (error) {
                console.error("汇率获取失败:", error);
                statusEl.innerText = "汇率同步失败，将以 1:1 计算";
                statusEl.style.color = "var(--neon-pink)";
            }
        }

        // 页面加载时拉取汇率
        window.onload = fetchRates;

        function calculate() {
            const price = parseFloat(document.getElementById('price').value);
            const currency = document.getElementById('currency').value;
            const start = new Date(document.getElementById('startDate').value);
            const end = new Date(document.getElementById('endDate').value);
            const today = new Date(document.getElementById('todayDate').value);

            if (!price || isNaN(start) || isNaN(end)) {
                alert("请完整填写信息");
                return;
            }

            const totalMs = end - start;
            const remainMs = end - today;

            if (totalMs <= 0 || remainMs <= 0) {
                alert("日期设置有误，请检查");
                return;
            }

            // 计算天数
            const totalDays = Math.ceil(totalMs / (1000 * 60 * 60 * 24));
            const remainDays = Math.ceil(remainMs / (1000 * 60 * 60 * 24));
            
            // 计算原币种价值
            const leftValue = (price / totalDays) * remainDays;

            // 计算折合人民币价值
            let leftValueCNY = leftValue;
            const currencyLower = currency.toLowerCase();
            
            // 如果获取到了汇率且选择的不是人民币，则进行换算
            // 公式: 原币价值 / (1 CNY 兑换目标货币的汇率) = CNY 价值
            if (currencyLower !== 'cny' && exchangeRates[currencyLower]) {
                leftValueCNY = leftValue / exchangeRates[currencyLower];
            }

            // 更新 DOM
            document.getElementById('totalDays').innerText = totalDays;
            document.getElementById('remainDays').innerText = remainDays;
            
            // 严格使用英文缩写
            document.getElementById('originalValue').innerText = `${currency} ${leftValue.toFixed(2)}`;
            document.getElementById('cnyValue').innerText = `CNY ${leftValueCNY.toFixed(2)}`;
            
            document.getElementById('resultBox').style.display = 'block';
        }
    </script>
</body>
</html>
